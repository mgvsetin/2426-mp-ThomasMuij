<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compact No / Yes Toggle</title>
  <style type="text/css">
    .tg {
      border-collapse: collapse;
      border-spacing: 0;
    }

    .tg td {
      border-color: black;
      border-style: solid;
      border-width: 1px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      overflow: hidden;
      padding: 10px 5px;
      word-break: normal;
    }

    .tg th {
      border-color: black;
      border-style: solid;
      border-width: 1px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: normal;
      overflow: hidden;
      padding: 10px 5px;
      word-break: normal;
    }

    .tg .tg-0lax {
      text-align: left;
      vertical-align: top
    }
  </style>
</head>

<body>
  <table class="tg">
    <thead>
      <tr>
        <td class="tg-0lax"></td>
      </tr>
    </thead>
  </table>

  <script>
    const myMap = new Map()

    myMap.set('key1', 'val1');
    myMap.set('key2', 'val1');
    myMap.set('key3', 'val1');

    console.log(myMap)

    for (const key of myMap.keys()) {
      console.log(key)
      console.log(myMap.get(key))
    }

    console.log(myMap);
  </script>

</body>

</html>
