<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests</title>
</head>

<body>
  <input>
  <script>
    async function errorFunc() {
      throw new Error('error func');
    }
    async function returnFunc(resolve) {
      return 'return func';
    }
    async function resolveFunc(resolve) {
      resolve('resolve func');
    }
    async function rejectFunc(reject) {
      reject('reject func');
    }

    async function func() {
      const [er, ret, res, rej] = await Promise.all([
        errorFunc().catch(() => {}),
        returnFunc(),
        new Promise((resolve, reject) => {
          resolveFunc(resolve);
        }),
        new Promise((resolve, reject) => {
          rejectFunc(reject);
        }).catch(() => {})
      ]);

      console.log('error', er);
      console.log('return', ret);
      console.log('response', res);
      console.log('reject', rej);
    }
    func();
  </script>
</body>

</html>
