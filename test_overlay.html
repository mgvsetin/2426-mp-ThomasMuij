<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Container overlay example</title>
<style>
  /* container that can hold dynamic content; must be positioned to be an overlay anchor */
  .region {
    position: relative;          /* IMPORTANT: anchor for the overlay */
    width: 420px;
    min-height: 200px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    margin: 20px;
    overflow: hidden;            /* keep overlay inside the region */
    background: #fff;
  }

  /* overlay base style */
  .region .overlay {
    position: absolute;
    inset: 0;                    /* top:0; right:0; bottom:0; left:0 */
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;                /* sits above region content */
    pointer-events: auto;        /* ensures overlay receives clicks if blocking */
    transition: opacity 180ms ease;
    opacity: 1;
  }

  /* default overlay look (semi-opaque) */
  .region .overlay.backdrop {
    background: rgba(0,0,0,0.45);
    color: white;
  }

  /* non-blocking overlay (clicks pass-through) */
  .region .overlay.nonblocking {
    pointer-events: none;        /* clicks pass through to underlying content */
  }

  /* for fade-out when removed (we'll remove from DOM after transition) */
  .overlay.leaving { opacity: 0; }

  /* optional blur class applied to content under the overlay */
  .region.blur-children > *:not(.overlay) {
    filter: blur(4px);
    user-select: none;
    pointer-events: none;        /* optionally block mouse events on underlying content */
  }

  /* small spinner */
  .spinner {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: rgba(255,255,255,0.9);
    animation: spin 0.9s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* controls layout */
  .controls { margin: 16px 20px; display:flex; gap:8px; flex-wrap:wrap; }
  button { padding:8px 12px; border-radius:6px; border:1px solid #bbb; background:#f6f6f6; cursor:pointer; }
</style>
</head>
<body>

<div class="controls">
  <button id="showBtn">Show overlay (blocking + blur)</button>
  <button id="showNonBlockingBtn">Show non-blocking overlay</button>
  <button id="updateContentBtn">Change inner content</button>
  <button id="updateOverlayBtn">Update overlay text</button>
  <button id="hideBtn">Hide overlay</button>
</div>

<div id="region" class="region" aria-live="polite">
  <h3 id="title">Dynamic content area</h3>
  <p id="body">This area can be changed by JS. Click "Change inner content" to update it.</p>
  <button id="innerAction">Inner action (clickable when not blocked)</button>
</div>

<script>
/**
 * Overlay API:
 * - showOverlay(container, options) -> returns overlay element
 * - hideOverlay(containerOrOverlay) -> removes overlay
 *
 * options:
 *   html: string | Node (overlay contents)
 *   className: string (additional classes for overlay)
 *   blocking: boolean (default true) - whether overlay blocks interaction
 *   blur: boolean (default false) - whether to add blur class to children
 *   ariaLabel: string - aria-label for overlay for screen readers
 */

function showOverlay(container, options = {}) {
  if (!(container instanceof Element)) throw new Error('container must be a DOM element');

  // remove existing overlay if present (simple approach)
  const existing = container.querySelector(':scope > .overlay');
  if (existing) container.removeChild(existing);

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  if (options.blocking === false) overlay.classList.add('nonblocking');

  if (options.className) overlay.classList.add(...options.className.split(/\s+/));
  if (options.ariaLabel) overlay.setAttribute('aria-label', options.ariaLabel);

  // default visual type
  overlay.classList.add('backdrop');

  // content
  if (options.html instanceof Node) {
    overlay.appendChild(options.html);
  } else if (typeof options.html === 'string') {
    // allow small safe HTML fragments; for safety prefer text nodes if user supplies plain text
    overlay.innerHTML = options.html;
  } else {
    overlay.innerHTML = '<div style="display:flex;align-items:center;"><div class="spinner" aria-hidden="true"></div><div>Loading…</div></div>';
  }

  // add overlay to the container
  container.appendChild(overlay);

  // optional blur underlay
  if (options.blur) container.classList.add('blur-children');

  // return overlay for further manipulation
  return overlay;
}

function hideOverlay(containerOrOverlay) {
  let overlay = null;
  let container = null;

  if (containerOrOverlay instanceof Element) {
    if (containerOrOverlay.classList.contains('overlay')) {
      overlay = containerOrOverlay;
      container = overlay.parentElement;
    } else {
      // assume it's the container
      container = containerOrOverlay;
      overlay = container.querySelector(':scope > .overlay');
    }
  }
  if (!overlay) return;

  // fade-out CSS: add leaving and remove after transition
  overlay.classList.add('leaving');
  // remove blur
  if (container) container.classList.remove('blur-children');

  overlay.addEventListener('transitionend', () => {
    if (overlay && overlay.parentElement) overlay.parentElement.removeChild(overlay);
  }, { once: true });

  // in case browser doesn't fire transitionend (fallback)
  setTimeout(() => {
    if (overlay && overlay.parentElement) overlay.parentElement.removeChild(overlay);
  }, 400);
}

/* --- demo wiring --- */
const region = document.getElementById('region');
const innerAction = document.getElementById('innerAction');

document.getElementById('showBtn').addEventListener('click', () => {
  showOverlay(region, {
    html: `<div style="display:flex;align-items:center;">
             <div class="spinner" aria-hidden="true"></div>
             <div><strong>Working…</strong><div style="font-size:0.9em">Please wait</div></div>
           </div>`,
    blocking: true,
    blur: true,
    ariaLabel: 'Loading overlay'
  });
});

document.getElementById('showNonBlockingBtn').addEventListener('click', () => {
  showOverlay(region, {
    html: `<div style="padding:6px 12px; background: rgba(255,255,255,0.9); border-radius:8px; color:#222;">
             Floating hint (non-blocking)
           </div>`,
    blocking: false,
    blur: false,
    className: 'tooltip-like'
  });
});

document.getElementById('hideBtn').addEventListener('click', () => {
  hideOverlay(region);
});

document.getElementById('updateContentBtn').addEventListener('click', () => {
  document.getElementById('title').textContent = 'Content changed ' + new Date().toLocaleTimeString();
  document.getElementById('body').textContent = 'Inner content updated at ' + new Date().toLocaleTimeString();
});

document.getElementById('updateOverlayBtn').addEventListener('click', () => {
  const ov = region.querySelector(':scope > .overlay');
  if (!ov) {
    alert('No overlay to update — show one first.');
    return;
  }
  // replace overlay inner HTML while keeping same overlay element
  ov.innerHTML = '<div style="padding:12px"><strong>Updated overlay</strong><div style="font-size:.85em">Overlay updated at ' + new Date().toLocaleTimeString() + '</div></div>';
});

/* inner action to demonstrate non-blocking overlay allows clicks */
innerAction.addEventListener('click', () => {
  alert('Inner action clicked!');
});
</script>

</body>
</html>
