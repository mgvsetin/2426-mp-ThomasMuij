<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objednávky</title>

  <link rel="stylesheet" href="/static/styles/general/general.css">
  <link rel="stylesheet" href="/static/styles/general/header.css">
  <link rel="stylesheet" href="/static/styles/general/sidebar.css">
  <link rel="stylesheet" href="/static/styles/index/index.css">
</head>

<body>
  <div id="header">
    <div id="header-left">
      <button id="open-sidebar-button">
        <img id="open-sidebar-icon" src="/static/images/icons/sidebar_icon.png">
      </button>
    </div>

    <div id="header-middle">
      <!-- <div id="search-div"> -->
        <div id="search-bar-container">
          <input id="search-bar" placeholder="Vyhledávání">
          <button id="search-button">
            <img id="search-icon" src="/static/images/icons/search_icon.png">
          </button>
        </div>
      <!-- </div> -->
    </div>

    <div id="header-right">
      <button id="account-button">
        <img id="account-icon" src="/static/images/icons/account_icon.png">
      </button>

      <div id="account-dropdown">
        <div id="session-info"></div>
        <button id="choose-new-event-button">
          Změnit akci
        </button>
        <a id="logout-link" href="/auth/logout">
          Odhlásit
        </a>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="close-sidebar-container">
      <button id="close-sidebar-button">
        <img id="close-sidebar-icon" src="/static/images/icons/sidebar_icon.png">
      </button>
    </div>
    <div id="sidebar-links"></div>
  </div>

  <div id="sidebar-overlay-page"></div>

  <main id="order">
    <div id="product-side">
      <div id="selectable-categories"></div>

      <div id="product-grid-container"></div>
    </div>

    <div id="summary-side">
      <div id="customer-details">
        <div id="customer-details-title">
          Zákazník
        </div>
        <div id="tag-id">
          Karta: 20000000-0000-0000-0000-000000000001
        </div>
        <div id="balance">
          Zůstatek: 3456 Kč
        </div>
      </div>
      <div id="order-summary-container">
        <div id="order-summary-title">
          Objednávka
        </div>
        <div id="order-summary"></div>
      </div>
      <div id="payment-summary">
        <div id="order-cost-row">
          <div id="order-cost-message">
            Celkem:
          </div>
          <div id="order-cost">
            3405 Kč
          </div>
        </div>
        <button id="pay-button">
          Zaplatit
        </button>
      </div>
    </div>
  </main>

  <script src="/static/scripts/index/index.js" type="module"></script>
</body>

</html>
