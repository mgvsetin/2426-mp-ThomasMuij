<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objednávky</title>

  <link rel="stylesheet" href="/static/styles/general/general.css">
  <link rel="stylesheet" href="/static/styles/general/header.css">
  <link rel="stylesheet" href="/static/styles/general/sidebar.css">
  <link rel="stylesheet" href="/static/styles/index/index.css">
</head>

<body>
  <div id="page-container">
    <div id="seller-page">
      <div id="product-side">
        <div id="search-div">
          <div id="search-bar-container">
            <input id="search-bar" placeholder="Vyhledávání">
            <div id="search-icon-container">
              <img id="search-icon" src="/static/images/icons/search_icon.png">
            </div>
          </div>
        </div>
        <div id="categories"></div>

        <div id="product-grid-container"></div>
      </div>

      <div id="summary-side">
        <div id="customer-details">
          <div id="customer-details-title">
            Zákazník
          </div>
          <div id="tag-id">
            Karta: -
          </div>
          <div id="balance">
            Zůstatek: -
          </div>
          <div id="balance-after-purchase">
            Zůstatek po platbě: -
          </div>
        </div>
        <div id="order-summary-container">
          <div id="order-summary-title">
            Objednávka
          </div>
          <div id="order-summary"></div>
        </div>
        <div id="payment-summary">
          <div id="order-cost-row">
            <div id="order-cost-message">
              Celkem:
            </div>
            <div id="order-cost">
              0 Kč
            </div>
          </div>
          <button id="pay-button">
            Zaplatit
          </button>
        </div>
      </div>
    </div>

    <div id="cashier-page">
      cashier page
    </div>
  </div>

  <script src="/static/scripts/index/index.js" type="module"></script>
</body>

</html>
