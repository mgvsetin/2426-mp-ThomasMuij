<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Správa akce</title>

  <link rel="stylesheet" href="/static/styles/general/general.css">
  <link rel="stylesheet" href="/static/styles/general/header.css">
  <link rel="stylesheet" href="/static/styles/general/sidebar.css">
  <link rel="stylesheet" href="/static/styles/event_managers/event_manager.css">
</head>

<body>
  <div id="container">
    <!-- <div id="topbar">
      <div id="event-search">
        <input id="search-bar" placeholder="Filtrovat v tabulkách (např. název, stánek ...)">
      </div>
    </div> -->

    <div id="search-div">
      <div id="search-bar-container">
        <input id="search-bar" placeholder="Vyhledávání" />
        <div id="search-icon-container">
          <img id="search-icon" src="/static/images/icons/search_icon.png" alt="search" />
        </div>
      </div>
    </div>

    <div id="card">
      <div id="event-head">
        <div id="event-info">
          <div id="event-name">-</div>
          <div class="id-muted muted" id="event-id">(-)</div>
          <div id="event-datetime">-</div>
          <div class="muted-block" style="margin-top:6px;">
            Vytvořil: <span id="event-created-by" class="muted">-</span>
            <span class="muted">•</span>
            <span id="event-created-at" class="muted">-</span>
          </div>
        </div>
        <div id="event-actions">
          <button id="open-graphs" class="btn btn-ghost">Zobrazit grafy</button>
          <button id="edit-event" class="btn btn-primary">Upravit akci</button>
          <button id="delete-event" class="btn">Smazat</button>
        </div>
      </div>

      <div class="grid">
        <section class="panel wide" id="booths-panel">
          <div class="panel-header">
            <h3>Stánky</h3>
            <div><button id="add-booth" class="btn">+ Přidat stánek</button></div>
          </div>
          <div class="table-wrap">
            <table id="booths-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Název</th>
                  <th>Typ</th>
                  <th class="muted">ID</th>
                  <th class="actions">Akce</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="panel" id="managers-panel">
          <div class="panel-header">
            <h3>Manažeři akce</h3>
            <div><button id="add-manager" class="btn">Přiřadit manažera</button></div>
          </div>
          <div class="table-wrap">
            <table id="managers-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Uživatel</th>
                  <th class="muted">Email</th>
                  <th class="actions">Akce</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="panel" id="employees-panel">
          <div class="panel-header">
            <h3>Ostatní zaměstnanci</h3>
            <div><button id="add-employee" class="btn">Přiřadit zaměstnance</button></div>
          </div>
          <div class="table-wrap">
            <table id="employees-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Uživatel</th>
                  <th>Role</th>
                  <th>Stánky</th>
                  <th class="actions">Akce</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="panel wide" id="products-panel">
          <div class="panel-header">
            <h3>Produkty & Ceny</h3>
            <div><button id="add-product" class="btn">Přidat produkt</button></div>
          </div>
          <div class="table-wrap">
            <table id="products-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Název</th>
                  <th>Cena (Kč)</th>
                  <th>Stánky</th>
                  <th class="actions">Akce</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script type="module" src="/static/scripts/event_managers/event_manager.js"></script>
</body>

</html>
