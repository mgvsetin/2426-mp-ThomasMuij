<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Správa zaměstnanců</title>

  <link rel="stylesheet" href="/static/styles/general/general.css">
  <link rel="stylesheet" href="/static/styles/general/header.css">
  <link rel="stylesheet" href="/static/styles/general/sidebar.css">
  <link rel="stylesheet" href="/static/styles/employee_manager/employee_manager.css">
</head>

<body>
  <div id="header">
    <div id="header-left">
      <button id="open-sidebar-button">
        <img id="open-sidebar-icon" src="/static/images/icons/sidebar_icon.png">
      </button>
    </div>

    <div id="header-middle">
      <!-- <div id="search-div"> -->
      <div id="search-bar-container">
        <input id="search-bar" placeholder="Vyhledávání">
        <button id="search-button">
          <img id="search-icon" src="/static/images/icons/search_icon.png">
        </button>
      </div>
      <!-- </div> -->
    </div>

    <div id="header-right">
      <button id="account-button">
        <img id="account-icon" src="/static/images/icons/account_icon.png">
      </button>

      <div id="account-dropdown">
        <div id="session-info"></div>
        <button id="choose-new-event-button">
          Změnit akci
        </button>
        <a id="logout-link" href="/auth/logout">
          Odhlásit
        </a>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="close-sidebar-container">
      <button id="close-sidebar-button">
        <img id="close-sidebar-icon" src="/static/images/icons/sidebar_icon.png">
      </button>
    </div>
    <div id="sidebar-links"></div>
  </div>

  <div id="sidebar-overlay-page"></div>

  <div id="container">
    <div id="topbar">
      <button id="add-employee-button">
        + Přidat zaměstnance
      </button>
    </div>

    <div id="card">
      <div id="table-wrap">
        <table id="employee-table">
          <thead>
            <tr>
              <th>Zaměstnanec</th>
              <th>Email</th>
              <th>Admin</th>
              <th>Vytvořil</th>
              <th>Vytvořen</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="employee-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>



  <script src="/static/scripts/employee_manager/employee_manager.js" type="module"></script>
</body>

</html>
