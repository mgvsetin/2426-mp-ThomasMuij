    // Request access to serial port
    async function connectToReader() {
      try {
        // Request port from user
        const port = await navigator.serial.requestPort();

        // Open the port with appropriate settings
        await port.open({
          baudRate: 9600, // Adjust based on your reader's specs
          dataBits: 8,
          stopBits: 1,
          parity: 'none'
        });

        console.log('Connected to card reader');
        console.log(port.getInfo())
        console.log(await port.getSignals())
        return port;
      } catch (error) {
        console.error('Error connecting:', error);
      }
    }

    // Read data from the serial port
    async function readCardData(port) {
      const textDecoder = new TextDecoderStream();
      const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
      const reader = textDecoder.readable.getReader();

      try {
        let cardId = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            break;
          }
          // value contains the card ID or data
          console.log('Card data:', value || String.raw(value));
          // handleCardData(value); // Process the card ID
        }
      } catch (error) {
        console.error('Read error:', error);
      } finally {
        reader.releaseLock();
      }
    }

    function handleCardData(cardId) {
      // Do something with the card ID
      console.log('Card ID detected:', cardId.trim());
    }

    async function use() {
      // Usage

    const forgetPortButton = document.querySelector('#forget-port-button');
    const forgetAllPortsButton = document.querySelector('#forget-all-ports-button');
    forgetPortButton.addEventListener('click', async () => {

        const port = await navigator.serial.requestPort();

      } catch { }
    });
    forgetAllPortsButton.addEventListener('click', async () => {
      const ports = await navigator.serial.getPorts();
      ports.forEach(port => {
        port.forget();
      })
    });




    const pickBoothButton = document.querySelector('#pick-booth-button');
    const payButton = document.querySelector('#pay-button');

    let cardReaderIsBeingRead = false;
    let lastReadCardId = '';
    setUpCardReading(false);

    async function setUpCardReading(calledFromInteraction = false) {
      if (cardReaderIsBeingRead) return;
      cardReaderIsBeingRead = true;
      let cardReaderPort;

      try {
        // porty, které uživatel povolil pomocí navigator.serial.requestPort()
        const pairedPorts = await navigator.serial.getPorts();

        if (pairedPorts.length === 1) {
          cardReaderPort = pairedPorts[0];
        } else if (calledFromInteraction) {
          // může se zavolat jen při interakci se stránku (např. kliknutí na tlačítko)
          cardReaderPort = await navigator.serial.requestPort();
        } else {
          // show connect reader button
          cardReaderIsBeingRead = false;
          return;
        }
      } catch (error) {
        console.error('Error pairing port:', error);
        cardReaderIsBeingRead = false;
        return;
      }

      try {
        if (!cardReaderPort.readable) {
          await cardReaderPort.open({ baudRate: 9600 }); // get baud rate from app config (check reader docs for it)
        }
      } catch (error) {
        console.error('Error opening port:', error);
        cardReaderIsBeingRead = false;
        return;
      }

      const textDecoder = new TextDecoderStream();
      const readableStreamClosed = cardReaderPort.readable.pipeTo(textDecoder.writable);
      const reader = textDecoder.readable.getReader();

      let timeoutId;
      
      try {
        let cardId = '';
        while (true) {
          const { value, done } = await reader.read();
          clearTimeout(timeoutId);
          if (done) {
            break;
          }

          cardId += value;

          // konec id karty, nejspíš \n nebo \r
          if (cardId.includes('\n') || cardId.includes('\r')) {
            handleCardRead(cardId);
            cardId = '';
          } else {
            // nebo dost dlouho od posdledního přečtení (100ms)
            timeoutId = setTimeout(() => {
              handleCardRead(cardId);
              cardId = '';
            }, 100);
          }
        }
      } catch (error) {
        console.error('Read error:', error);
      } finally {
        clearTimeout(timeoutId);
        reader.releaseLock();
        await readableStreamClosed.catch(() => { });
        cardReaderIsBeingRead = false;
      }
    }

    function handleCardRead(cardId) {
      cardId = cardId.trim();
      if (cardId.length === 0) return;
      lastReadCardId = cardId;
      console.log(lastReadCardId);
    }

      await setUpCardReading(true);
    });

      await setUpCardReading(true);
    });

    navigator.serial.addEventListener('connect', (event) => {
      setUpCardReading(false);
